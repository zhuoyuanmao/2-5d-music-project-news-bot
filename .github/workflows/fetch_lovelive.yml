name: Fetch Lovelive Tweets

on:
  schedule:
    # 每天 21:00 JST（日本标准时间），JST = UTC+9
    - cron: '0 12 * * *' 
      # 注意：GitHub Actions 使用 UTC 时间，所以 21:00 JST = 12:00 UTC
  workflow_dispatch:  # 手动触发，也方便调试

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Run fetch script
        run: |
          python fetch_lovelive.py

      - name: Upload JSON as artifact
        uses: actions/upload-artifact@v3
        with:
          name: lovelive-news
          path: news.json
