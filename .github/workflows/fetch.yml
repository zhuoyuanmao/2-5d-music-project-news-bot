name: Fetch LoveLive News

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0点（北京时间 8点）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run fetch
        run: python fetch.py

      - name: Commit news.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add news.json
          git commit -m "update news" || echo "no changes"
          git push
